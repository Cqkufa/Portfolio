<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Redes y Anuncios — FACU PERES</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Instrument+Serif:ital@0;1&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
:root{
  --bg:#0E0E10; --surface:#17171b; --surface-2:#202026;
  --ink:#F4F3F0; --ink-soft:#8a8a92; --hair:#ffffff14;
  --accent:#ADE6ED; --fc:#ADE6ED;
  --font:'Archivo', system-ui, sans-serif; --serif:'Instrument Serif', Georgia, serif; --mono:'Space Mono', monospace;
  --pad:clamp(18px,5vw,72px);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--ink);font-family:var(--font);line-height:1.45;-webkit-font-smoothing:antialiased;overflow-x:hidden}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
em{font-family:var(--serif);font-style:italic}
.mono2{font-family:var(--mono);font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-soft)}

/* nav */
.nav2{position:sticky;top:0;z-index:40;display:flex;align-items:center;justify-content:space-between;gap:16px;
  padding:15px var(--pad);background:#0e0e10cc;backdrop-filter:blur(12px);border-bottom:1px solid var(--hair)}
.back{display:flex;align-items:center;gap:9px;font-weight:800;font-size:15px}
.back__arrow{display:grid;place-items:center;width:30px;height:30px;border-radius:50%;border:1px solid var(--hair);transition:background .2s,color .2s}
.back:hover .back__arrow{background:var(--ink);color:#0E0E10}
.nav2__home{font-size:13px;font-weight:600;color:var(--ink-soft);transition:color .2s}
.nav2__home:hover{color:var(--ink)}

/* tabs */
.tabs{display:flex;flex-wrap:wrap;gap:9px;padding:26px var(--pad) 0}
.tab{padding:9px 16px;border-radius:100px;border:1px solid var(--hair);font-size:13px;font-weight:600;color:var(--ink-soft);transition:all .2s;white-space:nowrap}
.tab:hover{color:var(--ink);border-color:var(--ink-soft)}
.tab--on{background:var(--tc);border-color:var(--tc);color:#0E0E10}

/* header */
.shead{padding:30px var(--pad) clamp(30px,4vw,48px);display:flex;flex-direction:column;gap:18px;border-bottom:1px solid var(--hair)}
.shead__tag{align-self:flex-start;padding:9px 19px;background:var(--fc);color:#0E0E10;font-weight:800;font-size:13px;letter-spacing:.02em;border-radius:100px}
.shead__title{font-weight:900;font-size:clamp(46px,9vw,128px);line-height:.9;letter-spacing:-.03em}
.shead__row{display:flex;flex-wrap:wrap;gap:14px 40px;align-items:baseline;justify-content:space-between}
.shead__desc{max-width:46ch;font-size:clamp(15px,1.6vw,19px);color:var(--ink-soft);line-height:1.5;text-wrap:pretty}

/* section */
.sec{padding:clamp(40px,6vw,72px) 0 clamp(36px,5vw,60px)}
.sec + .sec{border-top:1px solid var(--hair)}
.sec__head{display:flex;flex-wrap:wrap;align-items:baseline;gap:10px 18px;justify-content:space-between;padding:0 var(--pad);margin-bottom:34px}
.sec__h{display:flex;align-items:baseline;gap:14px}
.sec__h h2{font-weight:800;font-size:clamp(26px,3.4vw,46px);letter-spacing:-.02em;line-height:1}
.sec__n{color:var(--fc) !important;white-space:nowrap;flex-shrink:0}

/* social post block */
.posts{display:flex;flex-direction:column;gap:clamp(40px,6vw,72px);padding:0 var(--pad)}
.post__head{display:flex;flex-wrap:wrap;gap:8px 14px;align-items:baseline;margin-bottom:22px}
.post__name{font-weight:800;font-size:clamp(20px,2.2vw,28px);letter-spacing:-.01em}
.post__cap{color:var(--ink-soft);font-size:14px;flex:1 1 280px;min-width:200px}
.frames{display:flex;flex-wrap:wrap;gap:clamp(18px,2.4vw,34px);align-items:flex-start;justify-content:center}
.frame{display:flex;flex-direction:column;gap:11px}
.frame__label{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-soft)}
.frame__label::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--fc)}
.shot{position:relative;overflow:hidden;border:1px solid var(--hair);background:#000;box-shadow:0 22px 54px #0007}
.shot img{width:100%;height:100%;object-fit:cover;display:block}
.frame--story .shot{width:clamp(232px,26vw,288px);aspect-ratio:9/16;border-radius:26px}
.frame--feed .shot{width:clamp(232px,26vw,288px);aspect-ratio:4/5;border-radius:14px}
.frame--story .shot::after{content:"";position:absolute;top:12px;left:50%;transform:translateX(-50%);width:54px;height:5px;border-radius:3px;background:#ffffff55}
.frame--ad .shot{width:clamp(232px,26vw,300px);aspect-ratio:1/1;border-radius:14px}

/* cta + footer */
.cta{padding:clamp(50px,7vw,90px) var(--pad);border-top:1px solid var(--hair);display:flex;flex-wrap:wrap;gap:20px;align-items:center;justify-content:space-between}
.cta__big{font-weight:900;font-size:clamp(32px,5vw,68px);line-height:.95;letter-spacing:-.02em}
.cta__big em{color:var(--accent);text-transform:none}
.cta__btn{padding:15px 26px;border-radius:100px;background:var(--accent);color:#0E0E10;font-weight:800;font-size:15px;transition:transform .2s}
.cta__btn:hover{transform:translateY(-2px)}
.footer2{display:flex;justify-content:space-between;padding:22px var(--pad);border-top:1px solid var(--hair)}

/* lightbox */
.lb{display:none;position:fixed;inset:0;z-index:999;background:#000c;align-items:center;justify-content:center;padding:20px}
.lb--on{display:flex}
.lb__img{max-width:100%;max-height:90dvh;object-fit:contain;border-radius:10px;box-shadow:0 24px 80px #0009}
.lb__close{position:fixed;top:18px;right:18px;width:40px;height:40px;border-radius:50%;background:#ffffff22;border:1px solid #ffffff33;color:#fff;font-size:20px;display:grid;place-items:center;cursor:pointer;backdrop-filter:blur(6px)}

@media(max-width:700px){
  .nav2__home{display:none}
  .posts{padding:0}
  .frames{flex-wrap:nowrap;overflow-x:auto;justify-content:flex-start;
    padding:4px 0 20px clamp(22px,6vw,72px);gap:14px;
    scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .frames::-webkit-scrollbar{display:none}
  .frames::after{content:"";flex:0 0 var(--pad);display:block}
  .frame{scroll-snap-align:start;flex-shrink:0}
  .frame--story .shot{width:min(180px,48vw)}
  .frame--feed .shot{width:min(180px,48vw)}
  .frame--ad .shot{width:min(180px,48vw)}
}
</style>
</head>
<body>
<nav class="nav2">
  <a class="back" href="Portfolio.html#services">
    <span class="back__arrow">←</span> FACU PERES
  </a>
  <a class="nav2__home mono2" href="Portfolio.html">Volver al portfolio</a>
</nav>

<div class="tabs" id="tabs"></div>
<header class="shead" id="shead"></header>

<main id="sections"></main>

<section class="cta">
  <h2 class="cta__big">¿Sumamos<br /><em>contenido?</em></h2>
  <a class="cta__btn" href="Portfolio.html#contact">Hablemos →</a>
</section>
<footer class="footer2 mono2">
  <span>© 2026 FACU PERES</span>
  <span>/FACU.ZIP</span>
</footer>

<!-- lightbox -->
<div class="lb" id="lb" onclick="closeLB()">
  <button class="lb__close" onclick="closeLB()">✕</button>
  <img class="lb__img" id="lb-img" src="" alt="" onclick="event.stopPropagation()" />
</div>
<script>
function openLB(src) {
  var lb = document.getElementById('lb');
  var img = document.getElementById('lb-img');
  img.src = src;
  lb.classList.add('lb--on');
  document.body.style.overflow = 'hidden';
}
function closeLB() {
  document.getElementById('lb').classList.remove('lb--on');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', function(e){ if(e.key==='Escape') closeLB(); });
</script>

<script src="src/data2.js"></script>
<script>
(function () {
  const d = window.FACU;
  const svc = d.services.find((s) => s.id === "social");

  document.documentElement.style.setProperty("--fc", svc.color);
  document.documentElement.style.setProperty("--accent", svc.color);

  // tabs
  document.getElementById("tabs").innerHTML = d.services.map((s) => {
    let href = "servicio.html?s=" + s.id;
    if (s.id === "video") href = "servicio-video.html";
    if (s.id === "social") href = "servicio-social.html";
    return '<a class="tab' + (s.id === "social" ? " tab--on" : "") + '" style="--tc:' + s.color + '" href="' + href + '">' + s.label + "</a>";
  }).join("");

  // header
  const posts = (d.social && d.social.posts) || [];
  document.getElementById("shead").innerHTML =
    '<span class="shead__tag">' + svc.short + "</span>" +
    '<h1 class="shead__title">' + svc.label + "</h1>" +
    '<div class="shead__row">' +
      '<p class="shead__desc">' + svc.desc + "</p>" +
    "</div>";

  // build one post block: story + feed shots
  function postBlock(p) {
    const stories = (p.stories || (p.story ? [p.story] : [])).map((src) =>
      '<div class="frame frame--story">' + shotImg(src, p.title + ' historia') + '</div>'
    ).join("");
    const feed = (p.feed || []).map((src) =>
      '<div class="frame frame--feed">' + shotImg(src, p.title + ' feed') + '</div>'
    ).join("");
    return '<article class="post">' +
      '<div class="post__head"><span class="post__name">' + p.title + "</span>" +
        (p.year ? '<span class="mono2">' + p.year + "</span>" : "") +
      "</div>" +
      '<div class="frames">' + stories + feed + "</div>" +
    "</article>";
  }

  // build one ad block: 1:1 shots
  function adBlock(p) {
    const shots = (p.shots || []).map((src) =>
      '<div class="frame frame--ad">' + shotImg(src, p.title + ' anuncio') + '</div>'
    ).join("");
    return '<article class="post">' +
      '<div class="post__head"><span class="post__name">' + p.title + "</span>" +
        (p.year ? '<span class="mono2">' + p.year + "</span>" : "") +
      "</div>" +
      '<div class="frames">' + shots + "</div>" +
    "</article>";
  }

  // make shots clickable — wrap img in a button that opens lightbox
  function shotImg(src, alt) {
    return '<div class="shot" onclick="openLB(\'' + src + '\')" style="cursor:zoom-in"><img src="' + src + '" alt="' + alt + '" loading="lazy" /></div>';
  }

  const ads = (d.social && d.social.ads) || [];
  document.getElementById("sections").innerHTML =
    '<section class="sec">' +
      '<div class="sec__head"><div class="sec__h"><span class="sec__n mono2">( 01 )</span><h2>Redes Sociales</h2></div></div>' +
      '<div class="posts">' + posts.map(postBlock).join("") + "</div>" +
    "</section>" +
    (ads.length
      ? '<section class="sec">' +
          '<div class="sec__head"><div class="sec__h"><span class="sec__n mono2">( 02 )</span><h2>Anuncios</h2></div></div>' +
          '<div class="posts">' + ads.map(adBlock).join("") + "</div>" +
        "</section>"
      : "");
})();
</script>
</body>
</html>
