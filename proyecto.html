<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Proyecto · FACU PERES</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Instrument+Serif:ital@0;1&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
:root{
  --bg:#0E0E10; --surface:#17171b; --surface-2:#202026;
  --ink:#F4F3F0; --ink-soft:#8a8a92; --hair:#ffffff14;
  --accent:#98E245; --fc:#2087E4;
  --font:'Archivo', system-ui, sans-serif; --serif:'Instrument Serif', Georgia, serif; --mono:'Space Mono', monospace;
  --pad:clamp(18px,5vw,72px);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--ink);font-family:var(--font);line-height:1.45;-webkit-font-smoothing:antialiased;overflow-x:hidden}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
em{font-family:var(--serif);font-style:italic}
.mono2{font-family:var(--mono);font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-soft)}

/* nav */
.nav2{position:sticky;top:0;z-index:40;display:flex;align-items:center;justify-content:space-between;gap:16px;
  padding:15px var(--pad);background:#0e0e10cc;backdrop-filter:blur(12px);border-bottom:1px solid var(--hair)}
.back{display:flex;align-items:center;gap:9px;font-weight:800;font-size:15px}
.back__arrow{display:grid;place-items:center;width:30px;height:30px;border-radius:50%;border:1px solid var(--hair);transition:background .2s,color .2s}
.back:hover .back__arrow{background:var(--ink);color:#0E0E10}
.nav2__home{font-size:13px;font-weight:600;color:var(--ink-soft);transition:color .2s}
.nav2__home:hover{color:var(--ink)}

/* hero */
.phero{display:grid;grid-template-columns:1.1fr 1fr;gap:clamp(28px,5vw,72px);align-items:center;
  padding:clamp(34px,5vw,72px) var(--pad) clamp(30px,4vw,56px);border-bottom:1px solid var(--hair)}
.phero__info{display:flex;flex-direction:column;gap:22px}
.phero__svc{align-self:flex-start;padding:9px 19px;background:var(--fc);color:#0E0E10;font-weight:800;font-size:13px;letter-spacing:.02em;border-radius:100px}
.phero__title{font-weight:900;font-size:clamp(48px,8vw,116px);line-height:.88;letter-spacing:-.03em}
.phero__intro{font-family:var(--serif);font-style:italic;font-size:clamp(20px,2.4vw,32px);line-height:1.25;color:var(--ink);max-width:22ch}
.phero__row{display:flex;flex-wrap:wrap;gap:10px 30px;align-items:center}
.tagrow{display:flex;flex-wrap:wrap;gap:8px}
.tagrow span{padding:6px 13px;border-radius:100px;border:1px solid var(--hair);font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-soft)}
.phero__cover{position:relative;overflow:hidden;border-radius:10px;border:1px solid var(--hair)}
.phero__cover img{width:100%;display:block;aspect-ratio:4/5;object-fit:cover}

/* about */
.pabout{padding:clamp(48px,7vw,90px) var(--pad);display:grid;grid-template-columns:minmax(0,1.6fr) minmax(0,1fr);gap:clamp(28px,5vw,80px);border-bottom:1px solid var(--hair)}
.pabout__txt{display:flex;flex-direction:column;gap:22px}
.pabout__txt p{font-size:clamp(16px,1.7vw,21px);line-height:1.62;color:#cfccc4;text-wrap:pretty;max-width:62ch}
.pabout__txt p:first-child{font-size:clamp(19px,2.1vw,27px);line-height:1.45;color:var(--ink);font-weight:500}
.pabout__side{display:flex;flex-direction:column;gap:18px;align-self:start;position:sticky;top:90px}
.pabout__side h4{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--fc)}
.pabout__meta{display:flex;flex-direction:column;gap:11px}
.pabout__meta div{display:flex;justify-content:space-between;gap:16px;border-bottom:1px solid var(--hair);padding-bottom:11px;font-size:14px}
.pabout__meta span:first-child{color:var(--ink-soft)}

/* gallery */
.pgal{padding:clamp(40px,6vw,80px) var(--pad) clamp(60px,8vw,110px)}
.pgal__h{display:flex;align-items:baseline;gap:14px;margin-bottom:36px}
.pgal__h h2{font-weight:800;font-size:clamp(24px,3vw,40px);letter-spacing:-.02em}
.pgal__h .mono2{color:var(--fc) !important}
.pgrid{columns:2;column-gap:clamp(18px,2.4vw,32px)}
.media{break-inside:avoid;margin-bottom:clamp(18px,2.4vw,32px);position:relative;border-radius:9px;overflow:hidden;border:1px solid var(--hair);background:var(--surface)}
.media img,.media video{width:100%;display:block}
.media__cap{position:absolute;left:11px;bottom:11px;background:#0e0e10cc;border:1px solid var(--hair);padding:5px 10px;border-radius:5px;font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.03em;color:var(--ink);backdrop-filter:blur(4px)}
.media--video::after{content:"";position:absolute;inset:0;pointer-events:none;box-shadow:0 0 0 1px var(--fc) inset;border-radius:9px;opacity:.5}

/* nextcta + footer */
.cta{padding:clamp(50px,7vw,90px) var(--pad);border-top:1px solid var(--hair);display:flex;flex-wrap:wrap;gap:20px;align-items:center;justify-content:space-between}
.cta__big{font-weight:900;font-size:clamp(32px,5vw,64px);line-height:.95;letter-spacing:-.02em}
.cta__big em{color:var(--accent);text-transform:none}
.cta__btns{display:flex;gap:12px;flex-wrap:wrap}
.cta__btn{padding:15px 26px;border-radius:100px;background:var(--accent);color:#0E0E10;font-weight:800;font-size:15px;transition:transform .2s}
.cta__btn--ghost{background:transparent;border:1px solid var(--hair);color:var(--ink)}
.cta__btn:hover{transform:translateY(-2px)}
.footer2{display:flex;justify-content:space-between;padding:22px var(--pad);border-top:1px solid var(--hair)}

@media(max-width:860px){
  .phero{grid-template-columns:1fr}
  .phero__cover{order:-1}
  .pabout{grid-template-columns:1fr}
  .pabout__side{position:static}
  .pgrid{columns:1}
  .nav2__home{display:none}
}
</style>
</head>
<body>
<nav class="nav2">
  <a class="back" id="back" href="Portfolio.html">
    <span class="back__arrow">←</span> FACU PERES
  </a>
  <a class="nav2__home mono2" href="Portfolio.html">Volver al portfolio</a>
</nav>

<header class="phero" id="phero"></header>
<section class="pabout" id="pabout"></section>
<section class="pgal" id="pgal"></section>

<section class="cta">
  <h2 class="cta__big">¿Te gustó este<br /><em>proyecto?</em></h2>
  <div class="cta__btns">
    <a class="cta__btn" href="Portfolio.html#contact">Trabajemos juntos →</a>
    <a class="cta__btn cta__btn--ghost" id="more" href="servicio.html?s=branding">Ver más trabajos</a>
  </div>
</section>
<footer class="footer2 mono2">
  <span>© 2026 FACU PERES</span>
  <span>/FACU.ZIP</span>
</footer>

<script src="src/data2.js"></script>
<script>
(function () {
  const d = window.FACU;
  const params = new URLSearchParams(location.search);
  const id = params.get("p");
  const p = d.projects.find((x) => x.id === id) || d.projects[0];
  const svc = d.services.find((s) => s.id === p.service) || d.services[0];

  document.documentElement.style.setProperty("--fc", svc.color);
  document.title = p.title + " · FACU PERES";
  document.getElementById("back").href = "servicio.html?s=" + svc.id;
  document.getElementById("more").href = "servicio.html?s=" + svc.id;

  // hero
  document.getElementById("phero").innerHTML =
    '<div class="phero__info">' +
      '<span class="phero__svc">' + svc.label + "</span>" +
      '<h1 class="phero__title">' + p.title + "</h1>" +
      (p.intro ? '<p class="phero__intro">' + p.intro + "</p>" : "") +
      '<div class="phero__row">' +
        '<div class="tagrow">' + (p.tags || []).map((t) => "<span>" + t + "</span>").join("") + "</div>" +
      "</div>" +
    "</div>" +
    '<div class="phero__cover"><img src="' + (p.cover || p.media[0].src) + '" alt="' + p.title + '" /></div>';

  // about
  const paras = (p.about || []).map((t) => "<p>" + t + "</p>").join("");
  document.getElementById("pabout").innerHTML =
    '<div class="pabout__txt">' + paras + "</div>" +
    '<aside class="pabout__side">' +
      "<h4>Detalle</h4>" +
      '<div class="pabout__meta">' +
        "<div><span>Cliente</span><span>" + p.title + "</span></div>" +
        "<div><span>Año</span><span>" + p.year + "</span></div>" +
        "<div><span>Servicio</span><span>" + svc.short + "</span></div>" +
        "<div><span>Rol</span><span>Diseño & dirección</span></div>" +
      "</div>" +
    "</aside>";

  // gallery
  function mediaItem(m) {
    if (m.type === "video") {
      return '<figure class="media media--video">' +
        '<video src="' + m.src + '" autoplay muted loop playsinline></video></figure>';
    }
    return '<figure class="media"><img src="' + m.src + '" alt="' + (m.cap || p.title) + '" loading="lazy" /></figure>';
  }
  document.getElementById("pgal").innerHTML =
    '<div class="pgal__h"><span class="mono2">( ' + String((p.media || []).length).padStart(2, "0") + " )</span>" +
    "<h2>Galería del proyecto</h2></div>" +
    '<div class="pgrid">' + (p.media || []).map(mediaItem).join("") + "</div>";
})();
</script>
</body>
</html>
